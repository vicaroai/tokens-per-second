name: Benchmark

# Runs the tokens-per-second benchmarks and opens a PR with the refreshed
# results. Triggered weekly (Mondays 06:00 UTC) OR manually from the Actions
# tab (workflow_dispatch).
#
# WHY A PR, NOT A DIRECT COMMIT: the bot only ever writes DATA (under
# benchmarks/results/ and the README's marked region). Landing it as a PR keeps
# main's history reviewable, gives every result set a diff, and the required
# bot-pr-is-data-only + secret-scan checks must pass before it merges — so a bad
# run can't reach main. The PR is opened and merged by the tokens-per-second-bot
# GitHub App (a ruleset bypass actor); human PRs still require review.

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you running this manually? (shown in the PR body)"
        required: false
        default: "manual run"

permissions:
  contents: write       # create the bench/auto-results branch
  pull-requests: write  # open the results PR

concurrency:
  # Never let two benchmark runs race to open competing result PRs.
  group: benchmark
  cancel-in-progress: false

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      # SHA-pinned: this job holds all four provider API keys (and mints an App
      # token), so a compromised mutable action tag here would mean full
      # credential exfiltration. Pin against that. (checkout v4 / setup-go v5.)
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: "1.25"
          cache: true

      - name: Run benchmarks
        env:
          # Provider API keys come from repository secrets of the same name as
          # the api_key_env values in benchmarks/models.yaml. Never hardcoded.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: go run ./cmd/tps bench

      # Mint a short-lived token for the tokens-per-second-bot GitHub App. Its
      # PRs are authored by tokens-per-second-bot[bot] — a distinct identity from
      # any human — so branch protection can require review for everyone while a
      # ruleset lets ONLY this bot merge its data-only PR. App tokens expire
      # in ~1h and are scoped to Contents + Pull requests on this repo only.
      - name: Mint App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1
        with:
          app-id: ${{ secrets.TPS_BOT_APP_ID }}
          private-key: ${{ secrets.TPS_BOT_APP_KEY }}

      - name: Open results PR
        id: cpr
        # Pinned to a commit SHA (not a moving tag) — this third-party action
        # runs with contents+PR write, so pin it against supply-chain tampering.
        # v6.1.0
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: "bench: weekly tokens-per-second results"
          title: "bench: refresh tokens-per-second results"
          body: |
            Automated benchmark refresh (${{ github.event_name }}: ${{ github.event.inputs.reason || 'scheduled' }}).

            Updates `benchmarks/results/latest.json`, the weekly history snapshot,
            and the README leaderboard. A provider dropping to zero usually means
            an expired key or an outage. Merged automatically once the required
            data-only + secret-scan checks pass.

            🤖 Generated by the Benchmark workflow.
          branch: bench/auto-results
          delete-branch: true
          # No labels: labeling a PR needs Issues:write on a fine-grained PAT;
          # the token is scoped to only Contents + Pull requests, so we skip it.
          add-paths: |
            benchmarks/results/**
            README.md

      # Direct squash-merge by the App, NOT --auto. GitHub's auto-merge queue
      # re-evaluates the review rule and ignores the ruleset bypass, so it would
      # sit forever waiting for a human. A direct merge performed by the App
      # (a ruleset bypass actor) goes through immediately — the required status
      # checks are watched to completion first. Non-bot PRs get no such bypass,
      # so human code changes still require review.
      - name: Merge the results PR
        if: steps.cpr.outputs.pull-request-operation == 'created' || steps.cpr.outputs.pull-request-operation == 'updated'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR: ${{ steps.cpr.outputs.pull-request-number }}
        run: |
          set -uo pipefail
          # Wait for the required checks to register + conclude. An initial
          # sleep lets them appear (a bare --watch can return "no checks
          # reported"); --watch then blocks until they finish.
          sleep 20
          gh pr checks "$PR" --watch --interval 15 --required || true
          # Merge via REST API PUT — the App is a ruleset bypass actor, so this
          # honors the bypass. Retry in case checks just settled.
          for attempt in 1 2 3 4 5 6; do
            if gh api -X PUT "repos/$GITHUB_REPOSITORY/pulls/$PR/merge" -f merge_method=squash; then
              echo "merged"; exit 0
            fi
            echo "merge not ready (attempt $attempt); retrying"; sleep 20
          done
          echo "::error::results PR #$PR did not merge"; exit 1
