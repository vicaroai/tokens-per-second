name: CI

# Fast gate on every PR and push to main: format, vet, lint, test, build.
# The harness (Go code) is human-reviewed; this keeps it honest.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # Server-side secret scan — the pre-commit hook only protects contributors
  # who installed it (and it can be bypassed with --no-verify), so CI runs
  # gitleaks over the whole history as an unbypassable backstop. We install the
  # gitleaks BINARY directly (free) rather than gitleaks-action, which requires
  # a paid license on organization repos.
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          VERSION=8.28.0
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Scan
        run: gitleaks detect --source . --config .gitleaks.toml --redact --verbose --no-banner

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-ed:"; echo "$unformatted"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        # v7 of the action is required for golangci-lint v2 (our .golangci.yml).
        uses: golangci/golangci-lint-action@v7
        with:
          # Pin the linter version so a new release can't silently change the
          # gate under us. Must be built with Go >= our go.mod target (1.25).
          version: v2.12.2

      - name: test
        run: go test -race ./...

      - name: build
        run: go build ./...

  # The benchmark bot auto-merges its PR (branch bench/auto-results), so enforce
  # that such a PR only ever touches result data + the README — never code,
  # workflows, or config. This is a REQUIRED check, so a buggy/tampered run that
  # writes elsewhere fails it and cannot auto-merge.
  #
  # The branch name is not a trust boundary on its own (anyone could name a
  # branch bench/auto-results). That case is covered by branch protection:
  # non-bot PRs require a human approval (required_approving_review_count >= 1),
  # so a spoofed data-only PR still cannot merge without review. This job's role
  # is purely to constrain the AUTO-merged bot path to data.
  bot-pr-is-data-only:
    if: github.event_name == 'pull_request' && github.head_ref == 'bench/auto-results'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Assert only data + README changed
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          changed=$(git diff --name-only "$BASE" "$HEAD")
          echo "Changed files:"; echo "$changed"
          # Fail closed: an empty diff on a bot PR is anomalous, not "clean".
          if [ -z "$changed" ]; then
            echo "::error::benchmark PR has no file changes — refusing."; exit 1
          fi
          # Every changed path must be result data or the README; any other
          # path fails the check (grep -v matching a bad line exits 0).
          if echo "$changed" | grep -vE '^(benchmarks/results/|docs/data/latest\.json$|README\.md$)'; then
            echo "::error::benchmark PR modified non-data files (listed above)."; exit 1
          fi
          echo "OK — data-only."
